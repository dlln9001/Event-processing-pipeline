spring.application.name=worker

spring.config.import=optional:file:.env[.properties]

# 2. CONSTRUCT THE JDBC URL
# Syntax: jdbc:postgresql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

# 3. MAP THE USER AND PASSWORD
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 4. SET THE DRIVER 
spring.datasource.driver-class-name=org.postgresql.Driver

# 5. Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# see more details for /heatlh
management.endpoint.health.show-details=always

# temporarily disable redis checking
management.health.redis.enabled=false

# so our object mapper (thing that serializes/deserializes) expects to translate from/to snakecase 
spring.jackson.property-naming-strategy=SNAKE_CASE

# kafka settings
spring.kafka.bootstrap-servers=${KAFKA_HOST}:9092