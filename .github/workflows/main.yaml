name: ci/cd pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and push go api
        uses: docker/build-push-action@v6
        with:
          context: ./api-go
          push: true
          # The name format is: ghcr.io/username/image-name:tag
          tags: ghcr.io/${{ github.repository_owner }}/event-processing-go-api:latest

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/event-processing-worker:latest