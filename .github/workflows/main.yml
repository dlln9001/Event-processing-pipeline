name: ci/cd pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # This is your GitHub username automatically
          password: ${{ secrets.GITHUB_TOKEN }} # This is a temporary password GitHub creates for this run

      - name: Build and push Folder 1
        uses: docker/build-push-action@v6
        with:
          context: ./folder1
          push: true
          # The name format is: ghcr.io/username/image-name:tag
          tags: ghcr.io/${{ github.repository_owner }}/my-app-1:latest

      - name: Build and push Folder 2
        uses: docker/build-push-action@v6
        with:
          context: ./folder2
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-app-2:latest